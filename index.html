<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>检验检测信息管理系统</title>
<style>
    body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f7fa; }
    .container { display: flex; height: 100vh; overflow: hidden; }
    
    /* 左侧菜单样式 */
    .sidebar { width: 250px; background: #2c3e50; color: white; overflow-y: auto; flex-shrink: 0; }
    .sidebar h2 { text-align: center; font-size: 18px; padding: 15px 0; border-bottom: 1px solid #1a252f; margin: 0; }
    .menu-group { padding-bottom: 10px; border-bottom: 1px solid #34495e; }
    .menu-title { padding: 12px 15px; font-weight: bold; font-size: 14px; color: #95a5a6; }
    .menu-item { padding: 10px 15px 10px 30px; cursor: pointer; font-size: 13px; transition: background 0.2s; }
    .menu-item:hover { background: #34495e; color: #42b983; }
    .menu-item.active { background: #42b983; color: white; font-weight: bold; }

    /* 右侧主区域样式 */
    .main { flex: 1; padding: 20px; display: flex; flex-direction: column; overflow: hidden; }
    .header-actions { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; flex-wrap: wrap; gap: 10px; }
    .search-box { display: flex; gap: 8px; }
    .search-box input { padding: 8px; width: 220px; border: 1px solid #ccc; border-radius: 4px; }
    
    /* 按钮组样式 */
    .btn-group { display: flex; gap: 8px; }
    button { padding: 8px 15px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 5px;}
    button:hover { background: #2980b9; }
    button.success { background: #2ecc71; }
    button.success:hover { background: #27ae60; }
    button.warning { background: #f39c12; }
    button.warning:hover { background: #d68910; }
    button.danger { background: #e74c3c; padding: 5px 10px; font-size: 12px; }
    button.danger:hover { background: #c0392b; }
    button.default { background: #95a5a6; }
    button.default:hover { background: #7f8c8d; }

    /* 表格与滚动区域样式 */
    .table-container { background: white; border-radius: 8px 8px 0 0; box-shadow: 0 2px 5px rgba(0,0,0,0.05); flex: 1; overflow: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 900px; }
    th, td { border-bottom: 1px solid #eee; padding: 12px 10px; text-align: left; font-size: 13px; white-space: nowrap; }
    th { background: #f8f9fa; font-weight: bold; color: #333; position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    tr:hover { background-color: #f1f4f8; }
    
    /* 底部统计栏 */
    .table-footer { background: #fffde7; padding: 15px; border-radius: 0 0 8px 8px; font-weight: bold; color: #d35400; border-top: 2px solid #f1c40f; display: flex; justify-content: flex-end; gap: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

    /* 弹窗样式 */
    #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; }
    .modal-content { background: #fff; width: 450px; margin: 50px auto; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); max-height: 80vh; overflow-y: auto;}
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #666; font-weight: bold;}
    .form-group input { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    .modal-actions { text-align: right; margin-top: 20px; position: sticky; bottom: -25px; background: white; padding: 10px 0; border-top: 1px solid #eee;}
</style>
</head>
<body>

<div class="container">
    <div class="sidebar" id="sidebar">
        </div>

    <div class="main">
        <h2 id="title" style="margin-top: 0;">请选择模块</h2>
        
        <div class="header-actions">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="请输入关键字组合搜索...">
                <button onclick="searchData()">搜索</button>
                <button class="default" onclick="resetSearch()">重置</button>
            </div>
            
            <div class="btn-group">
                <input type="file" id="fileUpload" style="display: none;" accept=".xlsx, .xls, .csv" onchange="handleFileUpload(event)">
                
                <button class="success" onclick="document.getElementById('fileUpload').click()">
                    <span>📄</span> 导入Excel
                </button>
                <button class="warning" onclick="exportData()">
                    <span>⬇️</span> 导出数据
                </button>
                <button onclick="openModal()">
                    <span>➕</span> 新增数据
                </button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr id="tableHeader"></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
        
        <div class="table-footer" id="tableFooter">
            </div>
    </div>
</div>

<div id="modal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px;">新增数据</h3>
        <div id="dynamicForm"></div>
        <div class="modal-actions">
            <button class="default" onclick="closeModal()">取消</button>
            <button onclick="saveData()" style="margin-left: 10px;">保存提交</button>
        </div>
    </div>
</div>

<script>
// ================= 配置数据区 =================

// 定义系统模块和对应的表格字段 (整合了旧图和新图的功能)
const sysModules = {
    // 基础业务与任务 (图1、图2)
    "合同台账(简)": ["合同编号", "金额", "状态", "签约人", "部门", "签约时间"],
    "项目方案管理": ["合同编号", "项目名称", "客户名称", "销售", "地区", "签约时间"],
    "检测任务": ["项目状态", "项目编号", "项目名称", "检测类型", "采样人员", "交样节点"],
    
    // 新增：销售与财务明细 (图3)
    "销售合同明细": ["合同编号", "客户名称", "项目名称", "合同额", "合同状态", "报告数量"],
    "合同回款明细": ["日期", "收款方式", "付款客户名称", "收款金额", "合同编号", "项目名称", "经手人"],
    "合同开票明细表": ["开票日期", "开票单位", "开票合同额", "合同编号", "项目名称", "经手人"],
    "合同收入确认明细": ["收入确认日期", "收入确认合同额", "收入确认方式", "合同编号", "合同单位名称", "经手人"],
    "销售合同台账": ["合同编号", "客户名称", "项目名称", "合同金额", "欠款金额", "已回款金额", "实验状态"],

    // 资源与系统 (图2最后一部分)
    "化学药品/试剂台账": ["名称", "型号/规格", "纯度", "批号", "状态", "存放位置", "数量"],
    "用户管理": ["账号", "用户名", "所属部门", "角色", "状态"]
};

// 需要在底部自动计算合计的字段关键词
const sumKeywords = ["金额", "合同额", "欠款"];

// 左侧菜单树形结构
const menuStructure = [
    { 
        title: "财务与销售(新)", 
        items: ["销售合同明细", "合同回款明细", "合同开票明细表", "合同收入确认明细", "销售合同台账"] 
    },
    { 
        title: "业务与任务(基础)", 
        items: ["合同台账(简)", "项目方案管理", "检测任务"] 
    },
    { 
        title: "资产与系统", 
        items: ["化学药品/试剂台账", "用户管理"] 
    }
];

// ================= 模拟数据库 =================
let currentModuleName = "";
let mockDatabase = {}; 
let displayData = [];  

// 初始化生成带有随机金额的假数据
function initMockData() {
    for (const mod in sysModules) {
        mockDatabase[mod] = [];
        // 每个模块造 3 条假数据体验
        for(let i=0; i<3; i++) {
            let mockItem = { id: Date.now() + Math.floor(Math.random() * 1000) + i };
            sysModules[mod].forEach(col => { 
                // 识别到是金额相关字段，生成纯数字以便后续汇总计算
                if(sumKeywords.some(kw => col.includes(kw))) {
                    mockItem[col] = Math.floor(Math.random() * 50000) + 10000; // 1万~6万随机数
                } else {
                    mockItem[col] = col + "_数据" + (i+1); 
                }
            });
            mockDatabase[mod].push(mockItem);
        }
    }
}

// ================= 核心渲染逻辑 =================

function renderSidebar() {
    const sidebar = document.getElementById("sidebar");
    let html = `<h2>业务管理系统</h2>`;
    menuStructure.forEach(group => {
        html += `<div class="menu-group"><div class="menu-title">${group.title}</div>`;
        group.items.forEach(item => {
            html += `<div class="menu-item" onclick="switchModule('${item}')" id="menu-${item}"> ▪ ${item}</div>`;
        });
        html += `</div>`;
    });
    sidebar.innerHTML = html;
}

function switchModule(moduleName) {
    if(currentModuleName) {
        const oldMenu = document.getElementById(`menu-${currentModuleName}`);
        if(oldMenu) oldMenu.classList.remove('active');
    }
    document.getElementById(`menu-${moduleName}`).classList.add('active');
    
    currentModuleName = moduleName;
    document.getElementById("title").innerText = moduleName;
    document.getElementById("searchInput").value = "";
    document.getElementById("searchInput").placeholder = `多条件组合检索 ${moduleName}...`;

    renderTable();
}

function renderTable() {
    const columns = sysModules[currentModuleName];
    const thead = document.getElementById("tableHeader");
    const tbody = document.getElementById("tableBody");
    
    // 渲染表头
    let thHtml = `<th>序号</th>`;
    columns.forEach(col => { thHtml += `<th>${col}</th>`; });
    thHtml += `<th>操作</th>`;
    thead.innerHTML = thHtml;

    // 渲染数据
    let tbHtml = "";
    displayData = mockDatabase[currentModuleName] || [];
    
    if (displayData.length === 0) {
        tbHtml = `<tr><td colspan="${columns.length + 2}" style="text-align:center;color:#999;padding:30px;">暂无数据，请导入或新增</td></tr>`;
    } else {
        displayData.forEach((row, index) => {
            tbHtml += `<tr><td>${index + 1}</td>`;
            columns.forEach(col => { 
                // 如果是金额，格式化一下加个 ¥
                let val = row[col];
                if(typeof val === 'number') val = '¥ ' + val.toLocaleString();
                tbHtml += `<td>${val || '-'}</td>`; 
            });
            tbHtml += `
                <td>
                    <button class="default" style="padding:4px 8px;font-size:12px;margin-right:5px;">详情</button>
                    <button class="danger" onclick="deleteData(${row.id})">删除</button>
                </td>
            </tr>`;
        });
    }
    tbody.innerHTML = tbHtml;
    
    renderFooter(); // 每次表格更新后，重新计算合计
}

// === 渲染底部汇总计算 ===
function renderFooter() {
    const footer = document.getElementById("tableFooter");
    const columns = sysModules[currentModuleName];
    let footerHtml = `<span>共计 ${displayData.length} 条记录</span>`;
    
    // 找出当前模块有哪些列是需要计算总计的（包含"金额", "合同额"等字眼）
    let colsToSum = columns.filter(col => sumKeywords.some(kw => col.includes(kw)));
    
    if(colsToSum.length > 0) {
        colsToSum.forEach(col => {
            let total = 0;
            displayData.forEach(row => {
                let val = Number(row[col]);
                if(!isNaN(val)) total += val;
            });
            footerHtml += `<span>${col}总计：<strong style="font-size:16px;">¥ ${total.toLocaleString()}</strong></span>`;
        });
    } else {
        footerHtml += `<span>--</span>`;
    }
    
    footer.innerHTML = footerHtml;
}

// ================= 业务交互逻辑 =================

function searchData() {
    const keyword = document.getElementById("searchInput").value.trim();
    const columns = sysModules[currentModuleName];
    const allData = mockDatabase[currentModuleName];
    
    if(!keyword) {
        displayData = allData;
    } else {
        // 简单模拟"多条件组合查询"：只要任何一个字段包含关键词即命中
        displayData = allData.filter(item => {
            return columns.some(col => String(item[col]).includes(keyword));
        });
    }
    // 复用绘制逻辑（这会包含重新计算总计）
    const tbody = document.getElementById("tableBody");
    renderTable(); 
}

function resetSearch() {
    document.getElementById("searchInput").value = "";
    searchData();
}

function deleteData(id) {
    if (!confirm("确定要删除这条记录吗？支持批量删除等进阶操作哦。")) return;
    mockDatabase[currentModuleName] = mockDatabase[currentModuleName].filter(item => item.id !== id);
    renderTable(); 
}

// 模拟文件上传
function handleFileUpload(event) {
    const file = event.target.files[0];
    if(file) {
        alert(`已成功读取文件: ${file.name}。\n在真实环境中，这里会解析Excel并在下方列表中渲染数据。`);
        // 重置上传框以便下次同名文件能触发onchange
        event.target.value = ''; 
    }
}

// 模拟导出数据
function exportData() {
    if(displayData.length === 0) {
        alert("当前没有数据可导出！");
        return;
    }
    alert(`【${currentModuleName}】共 ${displayData.length} 条数据，模拟导出Excel成功！\n文件已保存至本地下载目录。`);
}

// ================= 弹窗表单 =================

function openModal() {
    if(!currentModuleName) return;
    document.getElementById("modalTitle").innerText = `新增录入 - ${currentModuleName}`;
    const formDiv = document.getElementById("dynamicForm");
    const columns = sysModules[currentModuleName];
    
    let formHtml = "";
    columns.forEach(col => {
        // 如果是金额，提示输入数字
        let ph = sumKeywords.some(kw => col.includes(kw)) ? "请输入纯数字" : `请输入${col}`;
        let type = sumKeywords.some(kw => col.includes(kw)) ? "number" : "text";
        
        formHtml += `
            <div class="form-group">
                <label>${col}</label>
                <input type="${type}" id="input_${col}" placeholder="${ph}">
            </div>
        `;
    });
    formDiv.innerHTML = formHtml;
    document.getElementById("modal").style.display = "block";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

function saveData() {
    const columns = sysModules[currentModuleName];
    let newData = { id: Date.now() }; 
    
    for(let col of columns) {
        const val = document.getElementById(`input_${col}`).value;
        if(!val) { alert(`带星号必填：请填写 ${col}`); return; }
        
        // 如果填的是金额类型，转为Number方便后面计算总计
        if(sumKeywords.some(kw => col.includes(kw))) {
            newData[col] = Number(val);
        } else {
            newData[col] = val;
        }
    }
    
    mockDatabase[currentModuleName].unshift(newData); // 插入到最前面
    closeModal();
    renderTable();
}

// ================= 启动 =================
window.onload = () => {
    initMockData();
    renderSidebar();
    switchModule("销售合同明细"); // 默认打开图3的第一个模块
};

</script>
</body>
</html>
