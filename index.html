<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>信息管理系统</title>

<style>
body { margin: 0; font-family: Arial; }

.container { display: flex; height: 100vh; }

.sidebar {
    width: 220px;
    background: #2c3e50;
    color: white;
    padding: 10px;
}

.menu-item {
    padding: 10px;
    cursor: pointer;
}

.menu-item:hover {
    background: #34495e;
}

.main { flex: 1; padding: 20px; }

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th, td {
    border: 1px solid #ddd;
    padding: 8px;
}

th { background: #f4f4f4; }

.search-box { margin-bottom: 10px; }

button {
    margin: 5px;
    padding: 5px 10px;
}
</style>
</head>
<!-- 弹窗 -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">
    <div style="background:#fff; padding:20px; width:300px; margin:100px auto; border-radius:10px;">
        <h3>新增数据</h3>
        
        <input id="name" placeholder="名称" style="width:100%; margin:5px 0;"><br>
        <input id="status" placeholder="状态" style="width:100%; margin:5px 0;"><br>
        
        <button onclick="save()">保存</button>
        <button onclick="closeModal()">取消</button>
    </div>
</div>
<body>

<div class="container">

    <div class="sidebar">
        <h2>系统菜单</h2>
        <div class="menu-item" onclick="loadModule('项目方案')">项目方案</div>
    </div>

    <div class="main">
        <h2 id="title">项目方案</h2>

        <div class="search-box">
            <input type="text" id="search" placeholder="搜索名称">
            <button onclick="search()">搜索</button>
        </div>

        <button onclick="openModal()">新增数据</button>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>名称</th>
                    <th>状态</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>

</div>

<script>

let currentData = [];

// 加载数据
async function loadModule() {
    const res = await fetch("http://localhost:3000/projects");
    const data = await res.json();
    currentData = data;
    render(data);
}

// 渲染
function render(data) {
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    data.forEach(item => {
        tbody.innerHTML += `
        <tr>
            <td>${item.id}</td>
            <td>${item.name}</td>
            <td>${item.status}</td>
            <td>
                <button onclick="del(${item.id})">删除</button>
            </td>
        </tr>`;
    });
}

// 搜索
function search() {
    const key = document.getElementById("search").value;
    const list = currentData.filter(i => i.name.includes(key));
    render(list);
}

// 新增
async function add() {
    const name = prompt("名称");
    const status = prompt("状态");

    if (!name) return;

    await fetch("http://localhost:3000/projects", {
        method: "POST",
        headers: {"Content-Type":"application/json"},
        body: JSON.stringify({ name, status })
    });

    loadModule();
}

// 删除
async function del(id) {
    if (!confirm("确认删除？")) return;

    await fetch(`http://localhost:3000/projects/${id}`, {
        method: "DELETE"
    });

    loadModule();
}

// 页面加载自动执行
loadModule();
// ===== 弹窗功能 =====

// 打开弹窗
function openModal() {
    document.getElementById("modal").style.display = "block";
}

// 关闭弹窗
function closeModal() {
    document.getElementById("modal").style.display = "none";
}

// 保存数据
async function save() {
    const name = document.getElementById("name").value;
    const status = document.getElementById("status").value;

    if (!name || !status) {
        alert("请填写完整");
        return;
    }

    await fetch("http://localhost:3000/projects", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ name, status })
    });

    closeModal();
    loadModule(); // 刷新表格
}
</script>

</body>
</html>
